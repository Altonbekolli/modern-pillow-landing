name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wui/package-lock.json

      - name: Install React dependencies
        run: npm ci
        working-directory: wui

      - name: Build React
        run: npm run build
        working-directory: wui

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Check PHP syntax
        run: find backend -name "*.php" -print0 | xargs -0 -n1 php -l